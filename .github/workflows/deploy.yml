name: Segundo Deploy Django API

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Conectar al servidor y actualizar
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        scripts:
          cd ~/proyectos/mi-second-deploy
          git pull origin main
          docker-compose down
          docker-compose up --build -d